<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusGuard</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <header class="header">
          <p class="eyebrow">FocusGuard</p>
          <h1 id="modeLabel">Mode: -</h1>
        </header>

        <section class="timerWrap">
          <div id="timeRemaining" class="time">00:00</div>
          <div class="meta">
            <span id="phaseLabel">Focus</span>
            <span id="cycleCount">Cycles: 0</span>
          </div>
        </section>

        <section class="configWrap">
          <label class="field">
            <span>Mode</span>
            <select id="modeSelect">
              <option value="pomodoro15">Pomodoro 15/5</option>
              <option value="pomodoro25">Pomodoro 25/5</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <div class="customRow">
            <label class="field">
              <span>Focus min</span>
              <input id="customFocus" type="number" min="1" step="1" />
            </label>
            <label class="field">
              <span>Break min</span>
              <input id="customBreak" type="number" min="1" step="1" />
            </label>
          </div>
          <button id="applyConfigBtn" class="btn ghost">Apply Timer</button>
        </section>

        <section class="actions">
          <button id="startBtn" class="btn primary">Start</button>
          <button id="pauseBtn" class="btn">Pause</button>
          <button id="resetBtn" class="btn danger">Reset</button>
        </section>

        <footer class="footer">
          <span id="statusText"></span>
          <button id="openOptions" class="linkBtn">Open Options</button>
        </footer>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
