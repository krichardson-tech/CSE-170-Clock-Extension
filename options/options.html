<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusGuard Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>FocusGuard Settings</h1>
        <p>Customize your timer and distraction alerts.</p>
      </header>

      <section class="panel">
        <h2>Timer Mode</h2>
        <label class="field">
          <span>Default Mode</span>
          <select id="defaultMode">
            <option value="pomodoro15">Pomodoro 15/5</option>
            <option value="pomodoro25">Pomodoro 25/5</option>
            <option value="custom">Custom</option>
          </select>
        </label>

        <div class="customGrid">
          <label class="field">
            <span>Custom Focus (minutes)</span>
            <input id="customFocusMinutes" type="number" min="1" step="1" />
          </label>
          <label class="field">
            <span>Custom Break (minutes)</span>
            <input id="customBreakMinutes" type="number" min="1" step="1" />
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>Distraction Alerts</h2>
        <div class="row">
          <input id="siteInput" type="text" placeholder="e.g. youtube.com" />
          <button id="addSiteBtn" class="btn">Add Site</button>
        </div>
        <ul id="siteList" class="siteList"></ul>
      </section>

      <section class="panel">
        <h2>Notifications</h2>
        <label class="toggle">
          <input id="soundEnabled" type="checkbox" />
          <span>Enable notification sounds</span>
        </label>
      </section>

      <footer class="footer">
        <button id="saveBtn" class="btn primary">Save Settings</button>
        <span id="statusText"></span>
      </footer>
    </main>

    <script src="options.js"></script>
  </body>
</html>
